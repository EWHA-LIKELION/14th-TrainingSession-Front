<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세</title>
    <link rel="stylesheet" href="post-detail.css">
</head>
<body>
<header>
    <div class="header-inner">
        <img src="images/back.svg">
        <span>목록으로</span>
    </div>
</header>

<div class="container">
    <!-- 게시글 카드 -->
    <div class="post-card">
        <div class="author">
            <img src="images/profile.png">

            <div class="author-info">
                <span class="username">likelion2026</span>
                <span class="date">2026.MM.DD</span>
            </div>
        </div>
    
        <article class="post">

            <h1>HTML & CSS 심화 과제</h1>
            
            <div class="tags" id="tag-list"></div>
            
            <p>
            이것은 본문입니다. 여기에 더 많은 텍스트가 들어갈 수 있습니다. 게시물의 내용은 여러 단락으로 구성될 수 있으며, 다양한 주제에 대해 이야기할 수 있습니다.
            </p>

            <p>
            두 번째 단락입니다. 여기에는 더 많은 정보와 세부 사항이 포함될 수 있습니다.
            </p>

            <img src="images/photo.png" alt="게시글 사진">
        </article>

        <div class="reaction">
            <div>
                <img src="images/like.svg">
                <span>0</span>
            </div>

            <div>
                <img src="images/comment.svg">
                <span>0</span>
            </div>
        </div>
    </div>

    <!-- 댓글 영역 -->
    <div class="comment-section">
        <h3>
            댓글 <span id="comment-count" class="comment-count">0</span>
        </h3>
        <div class="comment-input">
            <img src="images/profile.png">
            <textarea id="comment-input" placeholder="댓글을 입력하세요"></textarea>
        </div>

        <button id="comment-btn" class="comment-button">댓글 작성</button>
        
        <!-- 댓글 리스트 -->
        <div id="comment-list">

            <div class="comment">
                <img src="images/profile.png">

                <div class="comment-body">
                    <div class="comment-top">
                        <div class="comment-user-info">
                            <span class="comment-user">likelion2026</span>
                            <span class="comment-date">2026.03.01 18:36</span>
                        </div>

                        <div class="comment-actions">
                            <span>수정</span>
                            <span class="delete">삭제</span>
                        </div>
                    </div>
        
                    <p>유익한 정보네요. 도움이 많이 되었습니다.</p>
                </div>
            </div>
        
            <div class="divider"></div>

            <div class="comment">
                <img src="images/profile.png">

                <div class="comment-body">
                    <div class="comment-top">
                        <div class="comment-user-info">
                            <span class="comment-user">likelion2026</span>
                            <span class="comment-date">2026.03.01 12:48</span>
                        </div>
                    </div>
            
                    <p>좋은 글 감사합니다!</p>
                </div>
            </div>

            <div class="divider"></div>

            </div>
        </div>
<script src="script.js"></script>
</body>
</html>
