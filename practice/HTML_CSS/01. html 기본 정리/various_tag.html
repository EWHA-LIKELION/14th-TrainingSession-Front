<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML&CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 1,2. form & input 태그를 아래에 작성해주세요. -->
     <form action="submit_url" method="get" class="form-example">
      <div class="form-example">
        <label for="user-name">이름</label>
        <input type="text" id="user-name" name="user-name" required>
      </div>
      <div class="form-example">
        <label for="user-email">이메일</label>
        <input type="email" id="user-email" name="user-email" required>
      </div>
      <button type="submit">제출하기</button>
    </form>
    <br />
    <!-- 3. textarea 태그를 아래에 작성해주세요. -->
     <div style="display:flex;">
      <label for="user-comment" style="margin-right: 0.5em;">댓글</label>
      <textarea id="user-comment" rows="6" cols="22"></textarea>
     </div>
    <br />
    <!-- 4. select 태그를 아래에 작성해주세요. -->
    <form>
      <label for="user-color" style="display: block;">색상 선택</label>
      <select id="user-color" required>
        <option value="" disabled selected>좋아하는 색상 선택</option>
        <option value="red">빨강</option>
        <option value="blue">파랑</option>
        <option value="yellow">노랑</option>
        <option value="green">초록</option>
      </select>
      <button type="submit">제출</button>
    </form>
    <br />
    <!-- 5. button 태그를 아래에 작성해주세요. -->
    <button type="button" onclick="msg();">버튼 클릭</button>
    <!-- 주로 자바스크립트와 함께 사용합니다. -->
    <script>
      const msg = () => {
        alert("프엔 아기사자들 환영합니다🦁💚");
      }
    </script>
  </body>
</html>
